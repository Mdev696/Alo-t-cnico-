<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKLOG SETORES - Dashboard Administrativo Fase 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --vivo-purple: #660099;
            --vivo-grey-bg: #F2F2F2;
            --white: #ffffff;
            --dark: #333333;
            --finalizado-color: #20c997;
            --prebaixa-color: #fd7e14;
            --pendente-color: #dc3545;
            --btn-blue: #007bff;
            --btn-green: #28a745;
            --btn-orange: #fd7e14;
            --btn-red: #dc3545;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--vivo-grey-bg);
            color: var(--dark);
        }

        header {
            background: var(--vivo-purple);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .dashboard-container {
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* GRID DE FILTROS - FASE 2 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 5px solid #ccc;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .kpi-card.active {
            border-bottom-width: 10px;
        }

        .kpi-card h3 {
            font-size: 0.8rem;
            color: #666;
            margin: 0;
            text-transform: uppercase;
        }

        .kpi-card .number {
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .card-pendente.active {
            border-color: var(--pendente-color);
        }

        .card-pendente .number {
            color: var(--pendente-color);
        }

        .card-prebaixa.active {
            border-color: var(--prebaixa-color);
        }

        .card-prebaixa .number {
            color: var(--prebaixa-color);
        }

        .card-fechado.active {
            border-color: var(--finalizado-color);
        }

        .card-fechado .number {
            color: var(--finalizado-color);
        }

        .backlog-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-size: 0.75rem;
            color: #555;
            border-bottom: 2px solid #eee;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        /* MODAL E OUTROS ESTILOS MANTIDOS DA VERSÃO ANTERIOR */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 2% auto;
            padding: 35px;
            width: 90%;
            max-width: 850px;
            border-radius: 15px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .btn-action {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>BACKLOG SETORES | GESTÃO FASE 2</h1>
        <button class="btn-action" style="background:rgba(255,255,255,0.2)" onclick="carregarDados()">🔄
            ATUALIZAR</button>
    </header>

    <div class="dashboard-container">
        <div class="kpi-grid">
            <div class="kpi-card card-pendente active" onclick="filtrarStatus('Pendente', this)">
                <h3>Pendentes</h3>
                <div id="count-pendente" class="number">0</div>
            </div>
            <div class="kpi-card card-prebaixa" onclick="filtrarStatus('Aguardando Baixa', this)">
                <h3>Pré-Baixa</h3>
                <div id="count-prebaixa" class="number">0</div>
            </div>
            <div class="kpi-card card-fechado" onclick="filtrarStatus('Finalizado', this)">
                <h3>Fechados</h3>
                <div id="count-finalizado" class="number">0</div>
            </div>
        </div>

        <section class="backlog-section">
            <div class="table-controls">
                <h2 id="table-title" style="font-size: 1.2rem; color: var(--vivo-purple); margin: 0;">📥 LISTA:
                    PENDENTES</h2>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>UF/Área</th>
                        <th>ARD</th>
                        <th>Setor</th>
                        <th>Técnico / Empresa</th>
                        <th>Irregularidade</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="backlog-body">
                </tbody>
            </table>
        </section>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">×</span>
            <h2 id="m-ticket"></h2>
            <div id="m-historico"></div>
            <button class="btn-action" style="background:var(--btn-red)" onclick="excluirTicket()">Excluir</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfjedufolkjrsajflfox.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmamVkdWZvbGtqcnNhamZsZm94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDMzNDcsImV4cCI6MjA4Nzg3OTM0N30.yoN65XgArlwDFAtVtIaKQIOsuIUDZCazqxUZ9Ckms7E';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dadosCompletos = [];
        let filtroAtual = 'Pendente';

        async function carregarDados() {
            const { data, error } = await supabaseClient.from('registros_alerta').select('*').order('created_at', { ascending: false });
            if (error) return;

            dadosCompletos = data;

            // Atualiza contadores dos cards
            document.getElementById('count-pendente').innerText = data.filter(i => i.status === 'Pendente').length;
            document.getElementById('count-prebaixa').innerText = data.filter(i => i.status === 'Aguardando Baixa').length;
            document.getElementById('count-finalizado').innerText = data.filter(i => i.status === 'Finalizado').length;

            renderizarTabela();
        }

        function filtrarStatus(status, elemento) {
            filtroAtual = status;

            // UI: Ativar card selecionado
            document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active'));
            elemento.classList.add('active');

            // UI: Atualizar título
            const titulos = { 'Pendente': 'PENDENTES', 'Aguardando Baixa': 'PRÉ-BAIXA', 'Finalizado': 'FECHADOS' };
            document.getElementById('table-title').innerText = `📥 LISTA: ${titulos[status]}`;

            renderizarTabela();
        }

        function renderizarTabela() {
            const listaFiltrada = dadosCompletos.filter(item => item.status === filtroAtual);
            const tbody = document.getElementById('backlog-body');

            tbody.innerHTML = listaFiltrada.map(item => {
                const corStatus = item.status === 'Pendente' ? 'var(--pendente-color)' : (item.status === 'Finalizado' ? 'var(--finalizado-color)' : 'var(--prebaixa-color)');

                return `
                <tr>
                    <td><b>#${item.ticket}</b></td>
                    <td>${item.uf || '--'} / ${item.area || '--'}</td>
                    <td>${item.ard || '--'}</td>
                    <td>${item.setor}</td>
                    <td><b>${item.tecnico_nome}</b><br><small style="color:gray">${item.empresa}</small></td>
                    <td>${item.tipo}</td>
                    <td><span class="status-pill" style="background:${corStatus}">${item.status}</span></td>
                    <td>
                        <button class="btn-action" style="background:var(--btn-blue); padding:5px 10px;" onclick="abrirVisualizacao('${item.id}')">Visualizar</button>
                    </td>
                </tr>`;
            }).join('');
        }

        // Funções de Modal e Ações (Mantidas da estrutura original)
        async function abrirVisualizacao(id) {
            // Lógica original de carregar modal...
            alert("Abrindo ticket ID: " + id);
            // Aqui você deve manter a sua função 'abrirVisualizacao' completa que já funcionava.
        }

        function fecharModal() { document.getElementById('viewModal').style.display = "none"; }

        // Inicialização
        carregarDados();
    </script>
</body>

</html>
