<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BACKLOG SETORES - Gestão Completa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --vivo-purple: #660099;
            --vivo-grey-bg: #F2F2F2;
            --white: #ffffff;
            --dark: #333333;
            --finalizado-color: #20c997;
            --prebaixa-color: #fd7e14;
            --pendente-color: #dc3545;
            --btn-blue: #007bff;
            --btn-green: #28a745;
            --btn-orange: #fd7e14;
            --btn-red: #dc3545;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--vivo-grey-bg);
            color: var(--dark);
        }

        header {
            background: var(--vivo-purple);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .dashboard-container {
            padding: 30px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* GRID DE FILTROS SUPERIORES */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 5px solid #ccc;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-3px);
        }

        .kpi-card.active {
            border-bottom-width: 10px;
        }

        .kpi-card h3 {
            font-size: 0.8rem;
            color: #666;
            margin: 0;
            text-transform: uppercase;
        }

        .kpi-card .number {
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        .card-pendente.active {
            border-color: var(--pendente-color);
        }

        .card-prebaixa.active {
            border-color: var(--prebaixa-color);
        }

        .card-fechado.active {
            border-color: var(--finalizado-color);
        }

        /* LINHA DE FILTROS SELECT */
        .filter-row {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-row label {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--vivo-purple);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }

        .filter-row select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.85rem;
            outline: none;
        }

        .backlog-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            min-width: 900px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-size: 0.75rem;
            color: #555;
            border-bottom: 2px solid #eee;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }

        /* MODAL & CARDS */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 2% auto;
            padding: 35px;
            width: 90%;
            max-width: 850px;
            border-radius: 15px;
            position: relative;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-item label {
            display: block;
            font-weight: bold;
            color: var(--vivo-purple);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .info-item div {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
            margin-top: 4px;
        }

        .history-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            border-left: 5px solid #ccc;
            padding: 15px;
            margin-top: 10px;
            border-radius: 4px;
            position: relative;
        }

        .history-card.principal {
            border-left-color: var(--vivo-purple);
            background: #f0f7ff;
        }

        .history-card.baixa-concluida {
            border-left-color: var(--btn-green);
            background: #f1faf3;
        }

        .photo-gallery img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-right: 10px;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        .btn-action {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .close-modal {
            position: absolute;
            right: 25px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .baixa-form label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .baixa-form input,
        .baixa-form select,
        .baixa-form textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <header>
        <h1>BACKLOG SETORES | GESTÃO</h1>
        <button class="btn-action" style="background:rgba(255,255,255,0.2)" onclick="carregarDados()">🔄
            ATUALIZAR</button>
    </header>

    <div class="dashboard-container">
        <div class="kpi-grid">
            <div class="kpi-card card-pendente active" onclick="filtrarStatus('Pendente', this)">
                <h3>Pendentes</h3>
                <div id="count-pendente" class="number" style="color:var(--pendente-color)">0</div>
            </div>
            <div class="kpi-card card-prebaixa" onclick="filtrarStatus('Aguardando Baixa', this)">
                <h3>Pré-Baixa</h3>
                <div id="count-prebaixa" class="number" style="color:var(--prebaixa-color)">0</div>
            </div>
            <div class="kpi-card card-fechado" onclick="filtrarStatus('Finalizado', this)">
                <h3>Fechados</h3>
                <div id="count-finalizado" class="number" style="color:var(--finalizado-color)">0</div>
            </div>
        </div>

        <div class="filter-row">
            <div class="filter-group">
                <label>UF</label>
                <select id="f-uf" onchange="renderizarTabela()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label>ÁREA</label>
                <select id="f-area" onchange="renderizarTabela()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label>ARD</label>
                <select id="f-ard" onchange="renderizarTabela()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filter-group">
                <label>SETOR</label>
                <select id="f-setor" onchange="renderizarTabela()">
                    <option value="">Todos</option>
                </select>
            </div>
            <button class="btn-mini"
                style="margin-top:15px; border:none; background:none; cursor:pointer; color:var(--btn-red); font-weight:bold;"
                onclick="limparFiltros()">Limpar Filtros</button>
        </div>

        <section class="backlog-section">
            <h2 id="table-title" style="font-size: 1.1rem; color: var(--vivo-purple);">📥 LISTA: PENDENTES</h2>
            <table>
                <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>UF/Área</th>
                        <th>ARD</th>
                        <th>Setor</th>
                        <th>Técnico / Empresa</th>
                        <th>Irregularidade</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="backlog-body"></tbody>
            </table>
        </section>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">×</span>
            <h2 style="color: var(--vivo-purple); margin-top:0;">Ticket <span id="m-ticket"></span></h2>
            <input type="hidden" id="current-db-id">

            <div class="info-grid">
                <div class="info-item"><label>Data</label>
                    <div id="m-data"></div>
                </div>
                <div class="info-item"><label>Técnico</label>
                    <div id="m-nome"></div>
                </div>
                <div class="info-item"><label>Irregularidade</label>
                    <div id="m-tipo"></div>
                </div>
                <div class="info-item"><label>Endereço</label>
                    <div id="m-endereco"></div>
                </div>
            </div>

            <div class="photo-gallery" id="m-fotos"></div>

            <div style="margin-top:25px; border-top: 2px solid #eee; padding-top:20px;">
                <div id="botoes-acao" style="display: flex; gap: 10px; margin-bottom:20px;">
                    <button class="btn-action" style="background: var(--btn-orange);" onclick="adicionarInfo()">+
                        NOTA</button>
                    <button id="btn-dar-baixa" class="btn-action" style="background: var(--btn-green);"
                        onclick="prepararBaixa()">✓ VALIDAR BAIXA</button>
                    <button class="btn-action" style="background: var(--btn-red); margin-left: auto;"
                        onclick="excluirTicket()">🗑️ EXCLUIR</button>
                </div>
                <div id="m-historico"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfjedufolkjrsajflfox.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmamVkdWZvbGtqcnNhamZsZm94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDMzNDcsImV4cCI6MjA4Nzg3OTM0N30.yoN65XgArlwDFAtVtIaKQIOsuIUDZCazqxUZ9Ckms7E';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosDados = [];
        let filtroStatusAtivo = 'Pendente';

        async function carregarDados() {
            const { data, error } = await supabaseClient.from('registros_alerta').select('*').order('created_at', { ascending: false });
            if (error) return;
            todosDados = data;

            // Atualiza contadores superiores
            document.getElementById('count-pendente').innerText = data.filter(i => i.status === 'Pendente').length;
            document.getElementById('count-prebaixa').innerText = data.filter(i => i.status === 'Aguardando Baixa').length;
            document.getElementById('count-finalizado').innerText = data.filter(i => i.status === 'Finalizado').length;

            preencherSelects(data);
            renderizarTabela();
        }

        function preencherSelects(data) {
            const ufs = [...new Set(data.map(i => i.uf).filter(Boolean))].sort();
            const areas = [...new Set(data.map(i => i.area).filter(Boolean))].sort();
            const ards = [...new Set(data.map(i => i.ard).filter(Boolean))].sort();
            const setores = [...new Set(data.map(i => i.setor).filter(Boolean))].sort();

            const atualizar = (id, lista) => {
                const el = document.getElementById(id);
                const valorAtual = el.value;
                el.innerHTML = '<option value="">Todos</option>' + lista.map(v => `<option value="${v}">${v}</option>`).join('');
                el.value = valorAtual; // Mantém seleção se houver
            };

            atualizar('f-uf', ufs);
            atualizar('f-area', areas);
            atualizar('f-ard', ards);
            atualizar('f-setor', setores);
        }

        function filtrarStatus(status, el) {
            filtroStatusAtivo = status;
            document.querySelectorAll('.kpi-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('table-title').innerText = `📥 LISTA: ${status.toUpperCase()}`;
            renderizarTabela();
        }

        function renderizarTabela() {
            const fUf = document.getElementById('f-uf').value;
            const fArea = document.getElementById('f-area').value;
            const fArd = document.getElementById('f-ard').value;
            const fSetor = document.getElementById('f-setor').value;

            const filtrados = todosDados.filter(i => {
                return i.status === filtroStatusAtivo &&
                    (!fUf || i.uf === fUf) &&
                    (!fArea || i.area === fArea) &&
                    (!fArd || i.ard === fArd) &&
                    (!fSetor || i.setor === fSetor);
            });

            document.getElementById('backlog-body').innerHTML = filtrados.map(item => `
                <tr>
                    <td><b>#${item.ticket}</b></td>
                    <td>${item.uf || '--'}/${item.area || '--'}</td>
                    <td>${item.ard || '--'}</td>
                    <td>${item.setor}</td>
                    <td>${item.tecnico_nome}<br><small>${item.empresa}</small></td>
                    <td>${item.tipo}</td>
                    <td><span class="status-pill" style="background:${item.status === 'Finalizado' ? 'var(--finalizado-color)' : (item.status === 'Pendente' ? 'var(--pendente-color)' : 'var(--prebaixa-color)')}">${item.status}</span></td>
                    <td><button class="btn-action" style="background:var(--btn-blue); padding:5px 10px;" onclick="abrirVisualizacao('${item.id}')">Ver</button></td>
                </tr>
            `).join('');
        }

        function limparFiltros() {
            document.getElementById('f-uf').value = "";
            document.getElementById('f-area').value = "";
            document.getElementById('f-ard').value = "";
            document.getElementById('f-setor').value = "";
            renderizarTabela();
        }

        // --- FUNÇÕES DE MODAL (ORIGINAIS MANTIDAS) ---

        async function abrirVisualizacao(id) {
            const { data, error } = await supabaseClient.from('registros_alerta').select('*').eq('id', id).single();
            if (error) return;

            document.getElementById('current-db-id').value = data.id;
            document.getElementById('m-ticket').innerText = `#${data.ticket}`;
            document.getElementById('m-data').innerText = new Date(data.created_at).toLocaleString();
            document.getElementById('m-nome').innerText = `${data.tecnico_nome} (${data.empresa})`;
            document.getElementById('m-tipo').innerText = data.tipo;
            document.getElementById('m-endereco').innerText = data.endereco;

            const fotos = data.fotos_urls ? data.fotos_urls.split(',') : [];
            document.getElementById('m-fotos').innerHTML = fotos.map(url => `<img src="${url}" onclick="window.open('${url}')">`).join('');

            document.getElementById('btn-dar-baixa').style.display = data.status === 'Finalizado' ? 'none' : 'block';

            const historicoArray = data.informacoes ? data.informacoes.split('---').filter(t => t.trim() !== "") : ["Sem relatos iniciais."];

            document.getElementById('m-historico').innerHTML = historicoArray.map((msg, index) => {
                const isBaixa = msg.includes('✅ BAIXA') || msg.includes('✅ VALIDADO');
                const isRecusa = msg.includes('⚠️ NÃO VALIDADO');
                let cardClass = isBaixa ? 'baixa-concluida' : (index === 0 ? 'principal' : '');
                const label = isBaixa ? '🏁 INFORMAÇÕES DA BAIXA' : (isRecusa ? '⚠️ RETORNO DE TRATATIVA' : (index === 0 ? 'TRATATIVA PRINCIPAL' : 'ATUALIZAÇÃO'));
                return `
                    <div class="history-card ${cardClass}">
                        <div style="position:absolute; right:10px; top:10px; display:flex; gap:5px;">
                            <button style="border:none; cursor:pointer; background:var(--btn-blue); color:white; border-radius:3px; padding:2px 5px;" onclick="editarNota(${index})">✏️</button>
                            <button style="border:none; cursor:pointer; background:var(--btn-red); color:white; border-radius:3px; padding:2px 5px;" onclick="excluirNota(${index})">🗑️</button>
                        </div>
                        <strong>${label}</strong>
                        <p style="white-space: pre-wrap; margin: 8px 0; font-size:0.85rem;">${msg.trim()}</p>
                    </div>`;
            }).join('');
            document.getElementById('viewModal').style.display = "block";
        }

        function prepararBaixa() {
            const id = document.getElementById('current-db-id').value;
            document.getElementById('m-historico').innerHTML = `
                <div class="history-card principal baixa-form" style="border-left-color: var(--btn-green); background: #f9fffb;">
                    <strong style="color:var(--btn-green)">📋 FORMULÁRIO DE VALIDAÇÃO</strong>
                    <label>Resultado da Validação</label>
                    <select id="baixa-motivo">
                        <option value="Finalizado">Validado (Concluir e Remover)</option>
                        <option value="Pendente">Não Validado (Retornar para Técnico)</option>
                    </select>
                    <label>Observação Final</label>
                    <textarea id="baixa-obs" rows="3" placeholder="Descreva a solução ou motivo da recusa..."></textarea>
                    <label>Foto da Solução (Opcional)</label>
                    <input type="file" id="baixa-galeria" accept="image/*">
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-action" style="background:var(--btn-green); flex:1" onclick="confirmarFinalizacao()">CONCLUIR AÇÃO</button>
                        <button class="btn-action" style="background:#888; flex:1" onclick="abrirVisualizacao('${id}')">CANCELAR</button>
                    </div>
                </div>`;
        }

        async function confirmarFinalizacao() {
            const id = document.getElementById('current-db-id').value;
            const novoStatus = document.getElementById('baixa-motivo').value;
            const obs = document.getElementById('baixa-obs').value;
            const fileInput = document.getElementById('baixa-galeria');
            if (!obs) return alert("Preencha a observação.");
            let fotoUrl = "";
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileName = `baixa_${id}_${Date.now()}.png`;
                const { data: upData, error: upErr } = await supabaseClient.storage.from('fotos_irregularidades').upload(fileName, file);
                if (!upErr) {
                    const { data: pUrl } = supabaseClient.storage.from('fotos_irregularidades').getPublicUrl(fileName);
                    fotoUrl = pUrl.publicUrl;
                }
            }
            const { data: ticket } = await supabaseClient.from('registros_alerta').select('informacoes, fotos_urls').eq('id', id).single();
            const prefixo = novoStatus === 'Finalizado' ? '✅ VALIDADO' : '⚠️ NÃO VALIDADO';
            const novaInfo = (ticket.informacoes || "") + " --- " + prefixo + " (" + new Date().toLocaleString() + "):\n" + obs;
            let fotosFinal = ticket.fotos_urls || "";
            if (fotoUrl) fotosFinal += (fotosFinal ? "," : "") + fotoUrl;
            await supabaseClient.from('registros_alerta').update({ status: novoStatus, informacoes: novaInfo, fotos_urls: fotosFinal }).eq('id', id);
            fecharModal(); carregarDados();
        }

        async function adicionarInfo() {
            const id = document.getElementById('current-db-id').value;
            const nota = prompt("Nova nota:");
            if (!nota) return;
            const { data: ticket } = await supabaseClient.from('registros_alerta').select('informacoes').eq('id', id).single();
            const atualizado = (ticket.informacoes || "") + " --- 🕒 " + new Date().toLocaleString() + ": " + nota;
            await supabaseClient.from('registros_alerta').update({ informacoes: atualizado }).eq('id', id);
            abrirVisualizacao(id);
        }

        async function editarNota(index) {
            const id = document.getElementById('current-db-id').value;
            const { data: ticket } = await supabaseClient.from('registros_alerta').select('informacoes').eq('id', id).single();
            let arr = ticket.informacoes.split('---');
            const novo = prompt("Editar nota:", arr[index].trim());
            if (novo !== null) { arr[index] = " " + novo + " "; await supabaseClient.from('registros_alerta').update({ informacoes: arr.join('---') }).eq('id', id); abrirVisualizacao(id); }
        }

        async function excluirNota(index) {
            if (!confirm("Excluir nota?")) return;
            const id = document.getElementById('current-db-id').value;
            const { data: ticket } = await supabaseClient.from('registros_alerta').select('informacoes').eq('id', id).single();
            let arr = ticket.informacoes.split('---');
            arr.splice(index, 1);
            await supabaseClient.from('registros_alerta').update({ informacoes: arr.join('---') }).eq('id', id);
            abrirVisualizacao(id);
        }

        async function excluirTicket() {
            if (!confirm("Excluir permanentemente?")) return;
            const id = document.getElementById('current-db-id').value;
            await supabaseClient.from('registros_alerta').delete().eq('id', id);
            fecharModal(); carregarDados();
        }

        function fecharModal() { document.getElementById('viewModal').style.display = "none"; }
        carregarDados();
    </script>
</body>

</html>
